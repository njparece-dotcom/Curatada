version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: quallection_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: quallection
      POSTGRES_PASSWORD: quallection
      POSTGRES_DB: quallection
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quallection -d quallection"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: quallection_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://quallection:quallection@db:5432/quallection
    volumes:
      - uploads:/app/public/uploads
    depends_on:
      db:
        condition: service_healthy

  cron:
    build: ./docker/cron
    container_name: quallection_cron
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - app

volumes:
  postgres_data:
  uploads:
